<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sustainopedia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/x-icon" href="/static/img/logo.ico">
    <!-- test -->
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"> -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEu1pX1q4dAaLyYah4py5ZKX+ZpSsgVmQ==" crossorigin="anonymous" referrerpolicy="no-referrer" /> -->
    <link rel="stylesheet" href="style.css">
    <script src="js lib/chart.umd.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Left Navigation / Tabs -->
        <nav class="left-nav">
            <ul>
                <li class="logo-tab">
                    <img src="static/img/logo.png" alt="Sustainopedia Logo" class="logo-img">
                    <span>Sustainopedia</span>
                </li>
                <li class="tab active nav-chat-tab" id="chatNavTab">
                    <a href="/index.html" class="nav-chat-link">Chat</a>
                    <div class="nav-chat-actions">
                        <button id="newChatBtn" class="nav-icon-btn" title="New conversation">
                            <span class="nav-icon">+</span>
                        </button>
                        <button id="toggleConversationList" class="nav-icon-btn" title="Conversation history" aria-expanded="false">
                            <span class="toggle-icon">⮟</span>
                        </button>
                    </div>
                </li>
                <li class="nav-conv-list-item" id="navConvListItem">
                    <div class="nav-conv-panel">
                        <ul id="conversationList" class="conversation-list"></ul>
                    </div>
                </li>
                <li class="tab"><a href="/records.html">LCA Records</a></li>
                <li class="tab"><a href="/settings.html">Settings</a></li>
            </ul>
            <div class="nav-user">
                <span id="navUsername" class="nav-username"></span>
                <button id="darkModeBtn" class="dark-mode-btn" title="Toggle dark / light mode" aria-label="Toggle dark mode">
                    <img src="static/img/dark-mode.png" alt="" class="dark-mode-icon" />
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Mobile-only top bar — hamburger opens the nav drawer -->
            <div class="mobile-topbar">
                <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Open navigation">&#9776;</button>
            </div>

            <!-- Page Content Container -->
            <div class="content-wrapper">
                <!-- Chatbot Page -->
                <div id="chatbot" class="page active">
                    <div class="chat-window" id="chatWindow">
                        <!-- Messages and welcome greeting are injected here -->
                    </div>

                    <form id="chatForm" class="input-form">
                        <!-- Textarea — top of the card -->
                        <textarea id="userInput" rows="1" placeholder="Ask about any product's environmental impact..."></textarea>

                        <!-- Bottom action bar: product · explore · mode · send -->
                        <div class="input-bottom-bar">
                            <div class="input-bottom-left">
                                <!-- Product pill -->
                                <div class="product-input-wrapper">
                                    <label for="productInput" class="product-label">Product</label>
                                    <input id="productInput" class="product-input" type="text" placeholder="e.g. Crude Steel" />
                                </div>
                                <!-- Explore button + feature menu -->
                                <div class="input-toolbar">
                                    <button type="button" id="featureMenuBtn" class="toolbar-btn" aria-expanded="false">
                                        <span class="toolbar-btn-plus">+</span> Toolbar
                                    </button>
                                    <div id="featureMenu" class="feature-menu" hidden>
                                        <button class="feature-menu-item" data-feature="lcia" type="button">
                                            <div class="fmenu-text">
                                                <strong>LCIA Computation</strong>
                                                <span>Carbon footprint with Monte Carlo analysis</span>
                                            </div>
                                        </button>
                                        <button class="feature-menu-item coming-soon" data-feature="literature" type="button">
                                            <div class="fmenu-text">
                                                <strong>Literature Retrieval</strong>
                                                <span>Coming soon&hellip;</span>
                                            </div>
                                        </button>
                                        <button class="feature-menu-item coming-soon" data-feature="compare" type="button">
                                            <div class="fmenu-text">
                                                <strong>Compare Materials</strong>
                                                <span>Coming soon&hellip;</span>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="input-bottom-right">
                                <!-- Mode button + popup -->
                                <div class="mode-btn-wrapper">
                                    <button type="button" id="modeMenuBtn" class="mode-btn" aria-expanded="false">
                                        <span id="modeBtnLabel">Thinking ⮝</span>
                                    </button>
                                    <div id="modeMenu" class="mode-menu" hidden>
                                        <button class="mode-menu-item active" data-mode="thinking" type="button">
                                            <div class="mode-item-text">
                                                <strong>Thinking</strong>
                                                <span>Full LCIA calculation with a detailed results table</span>
                                            </div>
                                        </button>
                                        <button class="mode-menu-item" data-mode="fast" type="button">
                                            <div class="mode-item-text">
                                                <strong>General</strong>
                                                <span>Quick AI response using LCA knowledge base</span>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                                <!-- Send button -->
                                <button type="submit" class="send-btn" title="Send">
                                    <img class="send-btn-img" src="./static/img/send-button.png" alt="Send">
                                </button>
                            </div>
                        </div>

                        <!-- Sample query cards shown after selecting a feature -->
                        <div id="sampleQueries" class="sample-queries" hidden></div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js lib/markdown-it.min.js"></script>
    <script src="functions/lcia-utils.js"></script>
    <script src="shared.js"></script>
    <script src="script.js"></script>
</body>

<!-- New Chat Modal -->
<div id="newChatModal" class="modal-overlay">
    <div class="modal-box">
        <h3>New Conversation</h3>
        <p>Enter a name for your new chat:</p>
        <input id="newChatNameInput" type="text" />
        <div class="modal-actions">
            <button id="createChatBtn" class="btn btn-primary">Create</button>
            <button id="cancelCreateBtn" class="btn btn-secondary">Cancel</button>
        </div>
    </div>
</div>
</html>
</body>
</html>
